<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chipilines Sv 2.0</title>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; background: #e0f7fa; margin: 0; padding: 20px; color: #1b5e20; }
        header { text-align: center; background: white; padding: 10px; border-radius: 30px; border: 3px solid #2e7d32; margin-bottom: 30px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; }
        h3 { color: #2e7d32; margin: 0 0 10px 0; }
    </style>
</head>
<body>

    <header>
        <h1>🌿 Chipilines Sv 2.0 🦜</h1>
    </header>

    <main class="grid-container" id="muro">
        </main>

    <script>
        // ---1Bdf9Ue4T4zXxghZMahmlqD1HcHEgChLZhpNljO2qDoU---
        const SHEET_ID = '1Bdf9Ue4T4zXxghZMahmlqD1HcHEgChLZhpN1jO2qDoU';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function cargarDatos() {
            try {
                const res = await fetch(URL);
                const texto = await res.text();
                const json = JSON.parse(texto.substr(47).slice(0, -2));
                const muro = document.getElementById('muro');

                json.table.rows.forEach(fila => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    // fila.c[0] es Titulo, fila.c[1] es Imagen, fila.c[2] es Descripcion
                    card.innerHTML = `
                        <img src="${fila.c[1] ? fila.c[1].v : ''}" onerror="this.src='https://via.placeholder.com/400x200?text=Error+en+Link'">
                        <div class="card-body">
                            <h3>${fila.c[0] ? fila.c[0].v : 'Sin título'}</h3>
                            <p>${fila.c[2] ? fila.c[2].v : ''}</p>
                        </div>
                    `;
                    muro.appendChild(card);
                });
            } catch (e) {
                console.log("Error:", e);
            }
        }

        cargarDatos();
    </script>
</body>
</html>

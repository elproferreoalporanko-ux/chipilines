<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chipilines Sv 2.0</title>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; background: #e0f7fa; margin: 0; padding: 20px; color: #1b5e20; }
        header { text-align: center; background: white; padding: 10px; border-radius: 30px; border: 3px solid #2e7d32; margin-bottom: 30px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; }
        h3 { color: #2e7d32; margin: 0 0 10px 0; }
    </style>
</head>
<body>

    <header>
        <h1>🌿 Chipilines Sv 2.0 🦜</h1>
    </header>

    <main class="grid-container" id="muro">
        </main>

    <script>
       const SHEET_ID = '1Bdf9Ue4T4zXxghZMahmlqD1HcHEgChLZhpN1jO2qDoU';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

fetch(URL)
    .then(res => res.text())
    .then(data => {
        const json = JSON.parse(data.substring(47).slice(0, -2));
        const rows = json.table.rows;
        const container = document.getElementById('cards-container');
        container.innerHTML = ''; // Limpia la carga

        rows.forEach((row, index) => {
            if (index === 0) return; // Salta los títulos
            
            const titulo = row.c[0] ? row.c[0].v : "Sin nombre";
            const imagen = row.c[1] ? row.c[1].v : "";
            const desc = row.c[2] ? row.c[2].v : "";

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${imagen}" alt="${titulo}" style="width:100%; border-radius:10px;">
                <h3>${titulo}</h3>
                <p>${desc}</p>
            `;
            container.appendChild(card);
        });
    })
    .catch(err => console.error("Error:", err));
    </script>
</body>
</html>
